name: CI/CD
on:
  push:
    branches: [ main ]

env:
  IMAGE: ghcr.io/kple1/lexiflow/wordapp

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet build Server/WordApp/WordApp.csproj -c Release

  push-image:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./Server
          push: true
          tags: ${{ env.IMAGE }}:latest

  deploy:
    needs: push-image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync docker-compose.yml to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: "Server/docker-compose.yml"
          target: "~/LexiFlow/Server"
          strip_components: 1

      # docker-compose.yml only references ${VAR} placeholders (no secrets committed).
      # This step (re)writes the real values into .env, which docker compose loads
      # automatically from the same directory — the file itself never touches git.
      - name: Deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        env:
          DB_SA_PASSWORD: ${{ secrets.DB_SA_PASSWORD }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_WORDS_DATA_SOURCE_ID: ${{ secrets.NOTION_WORDS_DATA_SOURCE_ID }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          envs: DB_SA_PASSWORD,NOTION_TOKEN,NOTION_WORDS_DATA_SOURCE_ID,ADMIN_TOKEN
          script: |
            cat > ~/LexiFlow/Server/.env <<EOF
            DB_SA_PASSWORD=$DB_SA_PASSWORD
            NOTION_TOKEN=$NOTION_TOKEN
            NOTION_WORDS_DATA_SOURCE_ID=$NOTION_WORDS_DATA_SOURCE_ID
            ADMIN_TOKEN=$ADMIN_TOKEN
            EOF
            cd ~/LexiFlow/Server
            docker compose pull
            docker compose up -d --force-recreate